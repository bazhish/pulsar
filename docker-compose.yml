version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ENVIRONMENT: development
      LOG_FORMAT: text
      DATABASE_URL: postgresql://ritmo:ritmo_dev@db:5432/ritmo_dev
      JWT_SECRET_KEY: local-dev-secret-key-change-before-production
      ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ritmo
      POSTGRES_PASSWORD: ritmo_dev
      POSTGRES_DB: ritmo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ritmo -d ritmo_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
