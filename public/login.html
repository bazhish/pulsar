<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | Ritmo Financeiro Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-visual" aria-hidden="true">
      <div>
        <span class="hero-badge">Ritmo Financeiro Pro</span>
        <h1>Seu mes com menos ruido.</h1>
        <p>Entre para acompanhar lancamentos, cartoes, metas e score em uma unica rotina financeira.</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="hero-badge">Ritmo Financeiro Pro</span>
          <h1>Entrar</h1>
          <p>Acesse sua central financeira.</p>
        </div>

        <p class="auth-success hidden" id="loginSuccess">Cadastro criado. Entre para continuar.</p>
        <p class="auth-error hidden" id="loginError"></p>

        <form class="auth-form" id="loginForm" novalidate>
          <label>
            <span>E-mail</span>
            <input name="email" type="email" autocomplete="email" maxlength="255" required />
          </label>

          <label>
            <span>Senha</span>
            <div class="password-field">
              <input name="password" type="password" autocomplete="current-password" maxlength="72" required />
              <button type="button" data-password-toggle>Mostrar</button>
            </div>
          </label>

          <button class="submit-btn" type="submit">Entrar</button>
        </form>

        <p class="auth-switch">Ainda nao tem conta? <a href="/register">Criar conta</a></p>
      </div>
    </section>
  </main>

  <script src="utils.js"></script>
  <script src="auth.js"></script>
</body>
</html>
