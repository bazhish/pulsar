<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta | Ritmo Financeiro Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-visual" aria-hidden="true">
      <div>
        <span class="hero-badge">Ritmo Financeiro Pro</span>
        <h1>Comece com uma base clara.</h1>
        <p>Crie sua conta para registrar receitas, despesas, cartoes e metas mensais com seguranca.</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="hero-badge">Ritmo Financeiro Pro</span>
          <h1>Criar conta</h1>
          <p>Configure seu acesso em poucos campos.</p>
        </div>

        <p class="auth-error hidden" id="registerError"></p>

        <form class="auth-form" id="registerForm" novalidate>
          <label>
            <span>Nome</span>
            <input name="name" type="text" autocomplete="name" maxlength="100" required />
          </label>

          <label>
            <span>E-mail</span>
            <input name="email" type="email" autocomplete="email" maxlength="255" required />
          </label>

          <label>
            <span>Senha</span>
            <div class="password-field">
              <input name="password" type="password" autocomplete="new-password" maxlength="72" required />
              <button type="button" data-password-toggle>Mostrar</button>
            </div>
            <small class="password-hint" id="passwordHint">Minimo 8 caracteres, 1 numero e 1 letra maiuscula.</small>
          </label>

          <label>
            <span>Confirmar senha</span>
            <div class="password-field">
              <input name="confirmPassword" type="password" autocomplete="new-password" maxlength="72" required />
              <button type="button" data-password-toggle>Mostrar</button>
            </div>
            <small class="password-hint hidden" id="confirmHint">As senhas precisam ser iguais.</small>
          </label>

          <button class="submit-btn" type="submit">Criar conta</button>
        </form>

        <p class="auth-switch">Ja tem conta? <a href="/login">Entrar</a></p>
      </div>
    </section>
  </main>

  <script src="utils.js"></script>
  <script src="auth.js"></script>
</body>
</html>
